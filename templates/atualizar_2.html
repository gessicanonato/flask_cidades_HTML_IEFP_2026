{% extends "base.html" %}

{% block title %}  Camalheia - Atualizar cidade  {% endblock %}

{% block intro %}
    <p id="p_titulo_01">Atualizar cidade</p>  
{% endblock %}

{% block content %}
    <br>
    <div>
        <form method="POST" action=" {{ url_for('cidades.editar_atualizar',cidade_id=dados.id_c) }} ">
            <input type="text" name="fnome" placeholder="Nome da cidade" class="class-inputs" required value="{{ dados.nome_c }}"> <br><br>
            <input type="text" name="fpais" placeholder="País" class="class-inputs" required value="{{ dados.pais_c }}"> <br><br>
            <input type="number" name="fdataf" placeholder="Data de fundação" class="class-inputs" required value="{{ dados.dataf_c }}"> <br><br>
            <input type="number" name="fhabitantes" placeholder="Número de habitantes" class="class-inputs" required value="{{ dados.habitantes_c }}"> <br><br>
            <textarea name="fdescricao" placeholder="Texto descritivo" class="class-inputs" required>{{dados.desc_c}}</textarea> <br><br>
            <input type="submit" value="atualizar"> 
            <input type="reset" value="apagar">
        </form>
        <br><br><br><br>
    </div>
{% endblock %}
